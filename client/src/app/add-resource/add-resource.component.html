<div class="container mt-4">
  <h3 class="mb-3">Add Resource to Event</h3>

  <div *ngIf="showError"   class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="showMessage" class="alert alert-success">{{ responseMessage }}</div>

  <form [formGroup]="itemForm" class="card p-3" (ngSubmit)="onSubmit()">
    <div class="row g-2">
      <div class="col-md-3">
        <label class="form-label">Event</label>
        <select class="form-select" formControlName="eventId">
          <option value="">-- Select Event --</option>
          <option *ngFor="let e of eventList" [value]="e.id">{{ e.title }}</option>
        </select>
        <div *ngIf="itemForm.get('eventId')?.invalid && itemForm.get('eventId')?.touched"
          class="text-danger small">Required.</div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Type</label>
        <input type="text" class="form-control" formControlName="type" />
        <div *ngIf="itemForm.get('type')?.invalid && itemForm.get('type')?.touched"
          class="text-danger small">Required.</div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Description</label>
        <input type="text" class="form-control" formControlName="description" />
        <div *ngIf="itemForm.get('description')?.invalid && itemForm.get('description')?.touched"
          class="text-danger small">Required.</div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Availability Status</label>
        <input type="text" class="form-control" formControlName="availabilityStatus" />
        <div *ngIf="itemForm.get('availabilityStatus')?.invalid && itemForm.get('availabilityStatus')?.touched"
          class="text-danger small">Required.</div>
      </div>
    </div>
    <div class="mt-3">
      <button type="submit" class="btn btn-success"
        [disabled]="itemForm.invalid">Add Resource</button>
    </div>
  </form>
</div>
