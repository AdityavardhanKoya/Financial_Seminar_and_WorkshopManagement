<div class="container mt-4">
  <h3 class="mb-3">Add Feedback</h3>

  <div class="card p-3 shadow-sm">
    <label class="form-label fw-semibold">Select Event</label>
    <select class="form-select mb-3" [(ngModel)]="selectedId">
      <option [ngValue]="null">-- Select --</option>
      <option *ngFor="let e of events" [ngValue]="e.id">{{e.title}}</option>
    </select>

    <label class="form-label fw-semibold">Feedback</label>
    <textarea class="form-control mb-2" rows="3" [(ngModel)]="content"></textarea>

    <button class="btn btn-success" (click)="submit()">Submit</button>
  </div>
</div>
