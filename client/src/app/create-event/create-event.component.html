<div class="container mt-4">
  <h3 class="text-primary fw-bold mb-3">Create / Update Event</h3>

  <div class="card p-3 mb-4 shadow-sm">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Title</label>
          <input class="form-control" formControlName="title">
        </div>

        <div class="col-md-4">
          <label class="form-label">Schedule</label>
          <input class="form-control" formControlName="schedule" placeholder="yyyy-MM-dd HH:mm">
        </div>

        <div class="col-md-4">
          <label class="form-label">Location</label>
          <input class="form-control" formControlName="location">
        </div>

        <div class="col-md-4">
          <label class="form-label">Status</label>
          <select class="form-select" formControlName="status">
            <option value="PENDING">PENDING</option>
            <option value="IN_PROGRESS">IN_PROGRESS</option>
            <option value="COMPLETED">COMPLETED</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">Max Enrollment</label>
          <input type="number" class="form-control" formControlName="maxEnrollment" min="1">
        </div>

        <div class="col-md-8">
          <label class="form-label">Description</label>
          <textarea rows="2" class="form-control" formControlName="description"></textarea>
        </div>
      </div>

      <div class="mt-3 d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-secondary" *ngIf="editId" (click)="cancelEdit()">Cancel</button>
        <button class="btn btn-primary" type="submit">
          {{ editId ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>

  <div class="card shadow-sm">
    <div class="card-header fw-semibold">My Events</div>
    <div class="card-body p-0">
      <table class="table table-hover mb-0" *ngIf="events.length">
        <thead class="table-dark">
          <tr>
            <th>ID</th><th>Title</th><th>Schedule</th><th>Status</th><th>Enrolled</th><th>Capacity</th><th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of pagedEvents" [class.table-warning]="editId===e.id">
            <td>{{e.id}}</td>
            <td>{{e.title}}</td>
            <td>{{e.schedule}}</td>
            <td>{{e.status}}</td>
            <td>{{e.enrollmentCount || 0}}</td>
            <td>{{e.maxEnrollment || '∞'}}</td>
            <td>
              <button class="btn btn-sm btn-warning" (click)="selectForEdit(e)">Edit</button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="p-3 text-muted" *ngIf="!events.length">No events.</div>
    </div>
  </div>

  <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
    <button class="btn btn-outline-secondary btn-sm" (click)="page=page-1" [disabled]="page===1">Prev</button>
    <span class="small">Page {{page}} / {{totalPages}}</span>
    <button class="btn btn-outline-secondary btn-sm" (click)="page=page+1" [disabled]="page===totalPages">Next</button>
  </div>
</div>
