<div class="pro-glass-dashboard d-flex align-items-center justify-content-center">
  <div class="login-card">
    
    <h1 class="page-title mb-2">Forgot Password</h1>
    <p class="subtitle mb-4">Enter your registered email to receive a 6-digit OTP code.</p>

    <div class="glass-panel p-4">
      <form [formGroup]="form">
        <div class="mb-4">
          <label class="glass-label">Email Address</label>
          <div class="glass-input-wrap" [class.is-invalid]="form.get('email')?.touched && form.get('email')?.invalid">
            <span class="input-icon">✉️</span>
            <input 
              type="email" 
              class="glass-input" 
              formControlName="email" 
              placeholder="Enter registered email">
          </div>
          <small class="text-danger-custom mt-2 d-block" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
            Please enter a valid email address
          </small>
        </div>

        <button type="button" class="btn-glass-submit w-100" (click)="sendOtp()">
          Send OTP
        </button>

        <div class="text-center mt-4">
          <p class="text-muted-light small mb-0">
            Know your password? 
            <a routerLink="/login" class="back-link ms-1">Back to Login</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
