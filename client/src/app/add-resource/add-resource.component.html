<div class="pro-glass-dashboard">
  <div class="container-fluid px-md-5">
    
    <div class="header-section mb-4">
      <div class="role-badge">
        <span class="pulse-dot"></span> Institution Portal
      </div>
      <h1 class="page-title">Add Resource</h1>
      <p class="subtitle">Attach educational materials, slides, or links to your scheduled events.</p>
    </div>

    <div class="glass-panel mb-5">
      <div class="panel-header">
        <h3 class="panel-title">Resource Details</h3>
      </div>
      
      <div class="panel-body">
        <div class="row g-4">
          
          <div class="col-md-6">
            <label class="glass-label">Select Event</label>
            <div class="glass-input-wrap">
              <span class="input-icon">📅</span>
              <select class="glass-input" [(ngModel)]="selectedEventId">
                <option [ngValue]="null">-- Select Event --</option>
                <option *ngFor="let e of events" [ngValue]="e.id">
                  {{ e.title }} ({{ e.schedule }})
                </option>
              </select>
            </div>
          </div>

          <div class="col-md-6">
            <label class="glass-label">Resource Name</label>
            <div class="glass-input-wrap">
              <span class="input-icon">📝</span>
              <input type="text" class="glass-input" [(ngModel)]="resource.name" placeholder="e.g. Presentation Slides">
            </div>
          </div>

          <div class="col-md-6">
            <label class="glass-label">Resource Type</label>
            <div class="glass-input-wrap">
              <span class="input-icon">📁</span>
              <input type="text" class="glass-input" [(ngModel)]="resource.type" placeholder="e.g. PDF / Video / Link">
            </div>
          </div>

          <div class="col-md-6">
            <label class="glass-label">Resource URL (Optional)</label>
            <div class="glass-input-wrap">
              <span class="input-icon">🔗</span>
              <input type="text" class="glass-input" [(ngModel)]="resource.url" placeholder="https://...">
            </div>
          </div>

        </div>

        <div class="mt-5 d-flex justify-content-end">
          <button class="btn-glass-submit" (click)="submit()">
            Add Resource
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
