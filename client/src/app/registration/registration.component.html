<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 shadow">
        <h3 class="text-center mb-4">Register</h3>
        <div *ngIf="showMessage" class="alert alert-info">{{ responseMessage }}</div>
        <form [formGroup]="itemForm" (ngSubmit)="onRegister()">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" formControlName="username" />
            <div *ngIf="itemForm.get('username')?.invalid && itemForm.get('username')?.touched"
              class="text-danger small">Username is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" formControlName="password" />
            <div *ngIf="itemForm.get('password')?.invalid && itemForm.get('password')?.touched"
              class="text-danger small">Min 4 characters required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email" />
            <div *ngIf="itemForm.get('email')?.invalid && itemForm.get('email')?.touched"
              class="text-danger small">Valid email is required.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" formControlName="role">
              <option [ngValue]="null">-- Select Role --</option>
              <option value="INSTITUTION">Institution</option>
              <option value="PROFESSIONAL">Professional</option>
              <option value="PARTICIPANT">Participant</option>
            </select>
            <div *ngIf="itemForm.get('role')?.invalid && itemForm.get('role')?.touched"
              class="text-danger small">Role is required.</div>
          </div>
          <button type="submit" class="btn btn-success w-100">Register</button>
          <p class="text-center mt-3">
            Already have an account? <a routerLink="/login">Login</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
