<div class="pro-glass-dashboard">
  <div class="container-fluid px-md-5">
    
    <div class="header-section mb-4">
      <div class="role-badge">
        <span class="pulse-dot"></span> Institution Portal
      </div>
      <h1 class="page-title">Assign Professional</h1>
      <p class="subtitle">Invite experts and financial professionals to lead your scheduled events.</p>
    </div>

    <div class="glass-panel mb-5">
      <div class="panel-header">
        <h3 class="panel-title">Assignment Details</h3>
      </div>
      
      <div class="panel-body">
        <div class="row g-4">
          
          <div class="col-md-6">
            <label class="glass-label">Select Event</label>
            <div class="glass-input-wrap">
              <span class="input-icon">📅</span>
              <select class="glass-input" [(ngModel)]="selectedEventId">
                <option [ngValue]="null">-- Select Event --</option>
                <option *ngFor="let e of events" [ngValue]="e.id">
                  {{ e.title }}
                </option>
              </select>
            </div>
          </div>

          <div class="col-md-6">
            <label class="glass-label">Select Professional</label>
            <div class="glass-input-wrap">
              <span class="input-icon">👨‍💼</span>
              <select class="glass-input" [(ngModel)]="selectedProfId">
                <option [ngValue]="null">-- Select Professional --</option>
                <option *ngFor="let p of pros" [ngValue]="p.id">
                  {{ p.username }} ({{ p.email }})
                </option>
              </select>
            </div>
          </div>

        </div>

        <div class="mt-5 d-flex justify-content-end">
          <button class="btn-glass-submit" (click)="assign()">
            Assign Professional
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
