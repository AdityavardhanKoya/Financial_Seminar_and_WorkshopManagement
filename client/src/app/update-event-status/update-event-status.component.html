<div class="container mt-4">
  <h3 class="mb-3">My Assignments</h3>

  <table class="table table-bordered table-hover" *ngIf="events.length">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Schedule</th>
        <th>Status</th>
        <th>My Response</th>
        <th>Assigned Professionals</th>
        <th>Assigned At</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let e of events; trackBy: trackById">
        <td>{{ e.id }}</td>
        <td>{{ e.title }}</td>
        <td>{{ e.schedule }}</td>
        <td>{{ e.status }}</td>
        <td>{{ myResponse(e) }}</td>
        <td>{{ professionalsText(e) }}</td>
        <td>{{ assignedAt(e) }}</td>

        <td class="d-flex gap-2 flex-wrap align-items-center">
          
          <ng-container *ngIf="myResponse(e) === 'PENDING'; else respondedTpl">
            <button class="btn btn-sm btn-success" (click)="respond(e, 'ACCEPTED')">Accept</button>
            <button class="btn btn-sm btn-danger" (click)="respond(e, 'REJECTED')">Reject</button>
          </ng-container>

          <ng-template #respondedTpl>
            <span class="badge px-3 py-2" [ngClass]="myResponse(e) === 'ACCEPTED' ? 'bg-success' : 'bg-danger'">
              {{ myResponse(e) }}
            </span>
          </ng-template>

        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!events.length" class="alert alert-info">No assignments.</div>
</div>
