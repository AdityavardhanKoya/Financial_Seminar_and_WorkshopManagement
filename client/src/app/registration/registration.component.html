<div class="login-wrapper">
  <div class="bg-scene">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="login-card">
    <div class="card-badge">
      <span class="dot"></span> Secure Portal
    </div>

    <h1>Create Account</h1>
    <p class="sub">Join our Fin Event Platform</p>

    <div *ngIf="showMessage" class="info-box">
      {{ responseMessage }}
    </div>

    <form [formGroup]="itemForm" (ngSubmit)="onRegister()">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" formControlName="username" placeholder="Enter username">
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <span class="icon">✉️</span>
          <input type="email" formControlName="email" placeholder="Enter email address">
        </div>
      </div>

      <div class="form-group">
        <label>Role</label>
        <div class="input-wrap">
          <span class="icon">🔑</span>
          <select class="select-input" formControlName="role">
            <option [ngValue]="null">-- Select Role --</option>
            <option value="INSTITUTION">Institution</option>
            <option value="PROFESSIONAL">Professional</option>
            <option value="PARTICIPANT">Participant</option>
          </select>
        </div>
      </div>

      <div class="form-group" *ngIf="itemForm.get('role')?.value === 'INSTITUTION' || itemForm.get('role')?.value === 'PROFESSIONAL'">
        <label>Authentication Code</label>
        <div class="input-wrap">
          <span class="icon">🛡️</span>
          <input type="text" formControlName="authCode" placeholder="Enter admin code" />
        </div>
      </div>

      <div class="form-group mb-2">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" formControlName="password" placeholder="••••••••" />
        </div>
      </div>

      <div class="rules-container" *ngIf="(itemForm.get('password')?.touched || itemForm.get('password')?.dirty) && !allRulesDone">
        <ul class="list-unstyled">
          <li *ngFor="let r of rules" 
              [class.hidden-rule]="r.hidden" 
              class="rule-item" 
              [ngClass]="r.flashGreen ? 'success' : 'pending'">
            <span class="indicator">{{ r.flashGreen ? '✔' : '•' }}</span> {{ r.text }}
          </li>
        </ul>
      </div>

      <button type="submit" class="btn-primary w-100 mt-3">REGISTER</button>

      <p class="signup-link">
        Already have an account? 
        <a routerLink="/login">Login</a>
      </p>

      <p class="signup-link" style="margin-top: 15px;">
        <a routerLink="/home">Return to Homepage</a>
      </p>
    </form>
  </div>
</div>
