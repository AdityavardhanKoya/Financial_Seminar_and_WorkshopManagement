<div class="login-wrapper">
  <div class="bg-scene">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="login-card">
    <div class="card-badge">
      <span class="dot"></span> Secure Portal
    </div>

    <h1>Welcome Back</h1>
    <p class="sub">Sign in to your account</p>

    <div *ngIf="showError" class="error-box">
      {{ errorMessage }}
    </div>

    <form [formGroup]="itemForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <div class="icon-box">👤</div>
          <input type="text" formControlName="username" placeholder="Enter username">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <div class="icon-box">🔒</div>
          <input type="password" formControlName="password" placeholder="Enter password">
        </div>
      </div>

      <div class="form-row">
        <label class="remember">
          <input type="checkbox"> Remember me
        </label>
        <a href="#" class="forgot">Forgot Password?</a>
      </div>

      <button class="btn-primary w-100">Login</button>

      <p class="signup-link">
        Don’t have an account?
        <a (click)="registration()">Register</a>
      </p>
    </form>
  </div>
</div>
