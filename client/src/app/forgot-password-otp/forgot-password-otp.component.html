<div class="container mt-5" style="max-width:420px">
  <h3 class="mb-3">Forgot Password</h3>

  <div class="card p-3 shadow-sm">
    <form [formGroup]="form">
      <label class="form-label fw-semibold">Email</label>
      <input class="form-control mb-2" type="email" formControlName="email" placeholder="Enter registered email">

      <small class="text-danger" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
        Enter a valid email
      </small>

      <button type="button" class="btn btn-primary w-100 mt-3" (click)="sendOtp()">
        Send OTP
      </button>
    </form>
  </div>
</div>
