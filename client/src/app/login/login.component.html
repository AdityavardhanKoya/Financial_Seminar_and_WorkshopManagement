<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 shadow">
        <h3 class="text-center mb-4">Login</h3>

        <div *ngIf="showError" class="alert alert-danger">{{ errorMessage }}</div>

        <form [formGroup]="itemForm" (ngSubmit)="onLogin()">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" formControlName="username"
              placeholder="Enter username" />
            <div *ngIf="itemForm.get('username')?.invalid && itemForm.get('username')?.touched"
              class="text-danger small">Username is required.</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" formControlName="password"
              placeholder="Enter password" />
            <div *ngIf="itemForm.get('password')?.invalid && itemForm.get('password')?.touched"
              class="text-danger small">Password must be at least 4 characters.</div>
          </div>

          <button type="submit" class="btn btn-primary w-100">Login</button>

          <p class="text-center mt-3">
            Don't have an account?
            <a href="javascript:void(0)" (click)="registration()">Register</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
