<div class="pro-glass-dashboard">
  <div class="container-fluid px-md-5">
    
    <div class="header-section mb-4">
      <div class="role-badge">
        <span class="pulse-dot"></span> Professional Portal
      </div>
      <h1 class="page-title">Add Feedback</h1>
      <p class="subtitle">Share your insights and professional evaluation for completed financial seminars.</p>
    </div>

    <div class="glass-panel mb-5">
      <div class="panel-header">
        <h3 class="panel-title">Submit Evaluation</h3>
      </div>
      
      <div class="panel-body">
        <div class="row g-4">
          
          <div class="col-md-12">
            <label class="glass-label">Select Completed Event</label>
            <div class="glass-input-wrap">
              <select class="glass-input" [(ngModel)]="selectedId">
                <option [ngValue]="null">-- Select Event --</option>
                <option *ngFor="let e of events" [ngValue]="e.id">
                  {{ e.title }}
                </option>
              </select>
            </div>
          </div>

          <div class="col-md-12">
            <label class="glass-label">Feedback Details</label>
            <div class="glass-input-wrap align-items-start">
              <textarea
                class="glass-input"
                rows="4"
                [(ngModel)]="content"
                placeholder="Describe the event outcome, participant engagement, or areas for improvement..."
              ></textarea>
            </div>
          </div>

        </div>

        <div class="mt-4 d-flex justify-content-end">
          <button class="btn-glass-submit" type="button" (click)="submit()">
            Submit Feedback
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
