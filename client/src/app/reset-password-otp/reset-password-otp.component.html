<div class="pro-glass-dashboard d-flex align-items-center justify-content-center">
  <div class="login-card">
    
    <h1 class="page-title mb-2">Reset Password</h1>
    <p class="subtitle mb-4">Verification code has been sent to your email address.</p>

    <div class="glass-panel p-4">
      <form [formGroup]="form">
        
        <div class="mb-3 text-start">
          <label class="glass-label">Email Address</label>
          <div class="glass-input-wrap readonly">
            <span class="input-icon">✉️</span>
            <input type="email" class="glass-input" formControlName="email" readonly>
          </div>
        </div>

        <div class="mb-3 text-start">
          <label class="glass-label">6-Digit OTP</label>
          <div class="glass-input-wrap" [class.is-invalid]="form.get('otp')?.touched && form.get('otp')?.invalid">
            <span class="input-icon">🔑</span>
            <input type="text" class="glass-input" formControlName="otp" placeholder="Enter OTP code">
          </div>
          <small class="text-danger-custom mt-1 d-block" *ngIf="form.get('otp')?.touched && form.get('otp')?.invalid">
            Enter the 6-digit code received
          </small>
        </div>

        <div class="mb-4 text-start">
          <label class="glass-label">New Password</label>
          <div class="glass-input-wrap" [class.is-invalid]="form.get('newPassword')?.touched && form.get('newPassword')?.invalid">
            <span class="input-icon">🔒</span>
            <input type="password" class="glass-input" formControlName="newPassword" placeholder="Minimum 6 characters">
          </div>
          <small class="text-danger-custom mt-1 d-block" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.invalid">
            Password must be at least 6 characters
          </small>
        </div>

        <button type="button" class="btn-glass-submit w-100" (click)="resetPassword()">
          Update Password
        </button>

        <div class="text-center mt-4">
          <p class="text-muted-light small mb-0">
            Cancel process? 
            <a routerLink="/login" class="back-link ms-1">Back to Login</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
