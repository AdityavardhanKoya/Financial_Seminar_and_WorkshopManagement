<div class="pro-glass-dashboard d-flex align-items-center justify-content-center">
  <div class="login-card">
    <div class="role-badge mb-3">
      <span class="pulse-dot"></span> Account Recovery
    </div>

    <h1 class="page-title mb-2">Forgot Password</h1>
    <p class="subtitle mb-4">Enter your registered email to receive a reset link.</p>

    <div class="glass-panel p-4">
      <div class="mb-4">
        <label class="glass-label">Email Address</label>
        <div class="glass-input-wrap">
          <span class="input-icon">✉️</span>
          <input 
            type="email" 
            class="glass-input" 
            [(ngModel)]="email" 
            placeholder="Enter registered email">
        </div>
      </div>

      <button class="btn-glass-submit w-100" (click)="submit()">
        Send Reset Link
      </button>

      <div class="text-center mt-4">
        <p class="text-muted-light small mb-0">
          Remembered your password? 
          <a routerLink="/login" class="text-white fw-bold text-decoration-none ms-1">Back to Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
