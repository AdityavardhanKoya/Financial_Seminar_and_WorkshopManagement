<div class="container mt-4">
  <h3 class="mb-3">My Assignments</h3>

  <table class="table table-bordered table-hover" *ngIf="events.length">
    <thead class="table-dark">
      <tr>
        <th>ID</th><th>Title</th><th>Schedule</th><th>Status</th>
        <th>My Response</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let e of events">
        <td>{{e.id}}</td>
        <td>{{e.title}}</td>
        <td>{{e.schedule}}</td>
        <td>{{e.status}}</td>

        <!-- Your backend returns professionalStatus map; professional sees own in event.professionalStatus[userId] if included -->
        <td>{{ e.assignmentStatus || 'PENDING' }}</td>

        <td class="d-flex gap-2 flex-wrap">
          <button class="btn btn-sm btn-success" (click)="respond(e,'ACCEPTED')">Accept</button>
          <button class="btn btn-sm btn-danger" (click)="respond(e,'REJECTED')">Reject</button>
          <button class="btn btn-sm btn-warning" (click)="selectForStatus(e)">Update Status</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!events.length" class="alert alert-info">No assignments.</div>

  <div class="card p-3 mt-3" *ngIf="selectedId">
    <h6>Update Status — Event ID: {{selectedId}}</h6>
    <select class="form-select w-auto" [(ngModel)]="status">
      <option [ngValue]="null">-- Select --</option>
      <option value="PENDING">PENDING</option>
      <option value="IN_PROGRESS">IN_PROGRESS</option>
      <option value="COMPLETED">COMPLETED</option>
    </select>
    <button class="btn btn-primary mt-2" (click)="saveStatus()">Save</button>
  </div>
</div>
