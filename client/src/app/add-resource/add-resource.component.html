<div class="container mt-4">
  <h3 class="mb-3 text-primary fw-bold">Add Resource</h3>

  <div class="card p-3 shadow-sm">

    <!-- Event Selection -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Select Event</label>
      <select class="form-select" [(ngModel)]="selectedEventId">
        <option [ngValue]="null">-- Select Event --</option>
        <option *ngFor="let e of events" [ngValue]="e.id">
          {{ e.title }} ({{ e.schedule }})
        </option>
      </select>
    </div>

    <!-- Resource Name -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Resource Name</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="resource.name"
        placeholder="e.g. Presentation Slides"
      >
    </div>

    <!-- Resource Type -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Resource Type</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="resource.type"
        placeholder="e.g. PDF / Video / Link"
      >
    </div>

    <!-- Resource URL (optional) -->
    <div class="mb-3">
      <label class="form-label fw-semibold">Resource URL (optional)</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="resource.url"
        placeholder="https://..."
      >
    </div>

    <!-- Submit -->
    <div class="d-flex justify-content-end">
      <button class="btn btn-success" (click)="submit()">Add Resource</button>
    </div>

  </div>
</div>
