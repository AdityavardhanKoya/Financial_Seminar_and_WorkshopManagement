<div class="container mt-4">

  <!-- ✅ PAGE HEADING -->
  <h2 class="mb-4 text-primary fw-bold">Add Resource</h2>

  <!-- ✅ SUCCESS & ERROR MESSAGES -->
  <div *ngIf="showError" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="showMessage" class="alert alert-success">{{ responseMessage }}</div>

  <!-- ✅ CARD BOX -->
  <div class="card shadow-sm p-4">

    <!-- ✅ BOX HEADING -->
    <h4 class="mb-3">Event</h4>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <!-- ✅ EVENT FIELD -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Event:</label>
        <select class="form-select" formControlName="eventId">
          <option [ngValue]="null">Choose Event</option>
          <option *ngFor="let e of eventList" [value]="e.id">{{ e.title }}</option>
        </select>
      </div>

      <!-- ✅ TYPE FIELD -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Type:</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter resource type"
          formControlName="type"
        />
      </div>

      <!-- ✅ DESCRIPTION FIELD -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Description:</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter description"
          formControlName="description"
        />
      </div>

      <!-- ✅ AVAILABILITY STATUS FIELD -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Availability Status:</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter availability status"
          formControlName="availabilityStatus"
        />
      </div>

      <!-- ✅ SUBMIT BUTTON -->
      <div class="text-end mt-3">
        <button
          class="btn btn-success px-4"
          type="submit"
          [disabled]="itemForm.invalid">
          Submit
        </button>
      </div>

    </form>
  </div>
</div>
