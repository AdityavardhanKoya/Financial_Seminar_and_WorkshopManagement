<div class="container mt-4">
  <h3 class="mb-3">Assign Professional</h3>

  <div class="card p-3 shadow-sm">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Event</label>
        <select class="form-select" [(ngModel)]="selectedEventId">
          <option [ngValue]="null">-- Select --</option>
          <option *ngFor="let e of events" [ngValue]="e.id">{{e.title}}</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">Professional</label>
        <select class="form-select" [(ngModel)]="selectedProfId">
          <option [ngValue]="null">-- Select --</option>
          <option *ngFor="let p of pros" [ngValue]="p.id">{{p.username}} ({{p.email}})</option>
        </select>
      </div>
    </div>

    <div class="mt-3">
      <button class="btn btn-warning" (click)="assign()">Assign</button>
    </div>
  </div>
</div>
