<ng-container *ngIf="showNavbar">
  
  <div *ngIf="notification" class="alert-custom-toast alert-{{notification.type}}">
    <span class="dot"></span> {{ notification.message }}
  </div>

  <nav class="navbar navbar-expand-lg custom-transparent-nav" [class.scrolled]="isScrolled">
    <div class="container-fluid px-md-5">
      
      <a class="navbar-brand logo" routerLink="/view-events">Fin Event.</a>
      
      <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
  
      <div class="collapse navbar-collapse" id="navbarNav">
        
        <div class="nav-links me-auto mt-3 mt-lg-0">
          
          <ng-container *ngIf="roleName === 'INSTITUTION'">
            <a routerLink="/create-event">Manage Event</a>
            <a routerLink="/delete-event">Delete Event</a>
            <a routerLink="/assign-professional">Assign Professional</a>
            <a routerLink="/view-institution">View Events</a>
          </ng-container>
  
          <ng-container *ngIf="roleName === 'PROFESSIONAL'">
            <a routerLink="/update-event-status">My Events</a>
            <a routerLink="/add-feedback">Add Feedback</a>
            <a routerLink="/view-professional">View Events</a>
          </ng-container>
  
          <ng-container *ngIf="roleName === 'PARTICIPANT'">
            <a routerLink="/view-events">View Events</a>
          </ng-container>

        </div>
  
        <div class="nav-links ms-auto align-items-center mt-3 mt-lg-0" *ngIf="isLoggedIn">
          <span class="user-pill">
            Welcome, <strong class="text-white">{{ username }}</strong>
            <span class="role-badge">{{ roleName }}</span>
          </span>
          
          <a class="logout-link" (click)="logout()">Logout</a>
        </div>

      </div>
    </div>
  </nav>

</ng-container>
